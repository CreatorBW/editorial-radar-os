[theme]
base = "light"
primaryColor = "#0F172A"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#0F172A"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"

enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
